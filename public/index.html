<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACHA PAIR - PREMIUM SYSTEM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle, #0d1b2a 0%, #010811 100%); color: #fff; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 180, 216, 0.2); border-radius: 20px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 0 30px rgba(0, 119, 182, 0.2); text-align: center; backdrop-filter: blur(10px); }
        h1 { color: #00b4d8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-size: 28px; text-shadow: 0 0 10px rgba(0, 180, 216, 0.5); }
        .subtitle { font-size: 13px; color: #90e0ef; margin-bottom: 25px; opacity: 0.7; }
        p { font-size: 15px; margin-bottom: 15px; color: #e2e8f0; }
        input { width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 180, 216, 0.3); border-radius: 12px; color: #fff; font-size: 16px; text-align: center; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 15px; background: #0077b6; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #00b4d8; }
        .code-box { display: none; margin-top: 25px; background: rgba(0, 119, 182, 0.1); border: 1px dashed #00b4d8; padding: 20px; border-radius: 12px; }
        .pairing-code { font-size: 26px; font-weight: bold; color: #fff; letter-spacing: 3px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>?? MACHA PAIR</h1>
        <div class="subtitle">PREMIUM SESSION GENERATOR SYSTEM</div>
        <p>Weka namba yako ya WhatsApp (Anza na 255)</p>
        <input type="text" id="phone" placeholder="Mfano: 255612801118">
        <button id="submitBtn" onclick="requestCode()">Request Code</button>
        <div class="code-box" id="codeBox">
            <p>Pairing Code Yako Hii Hapa:</p>
            <div class="pairing-code" id="pairingCode">---- ----</div>
        </div>
    </div>
    <footer>© Powered By DJ MACHA 255 ??</footer>
    <script>
        async function requestCode() {
            const phone = document.getElementById('phone').value.trim();
            if(!phone) return alert('Weka namba!');
            document.getElementById('submitBtn').innerText = 'Inatengeneza... ??';
            try {
                const res = await fetch(`/api/pair?phone=${phone}`);
                const data = await res.json();
                if(data.code) {
                    document.getElementById('pairingCode').innerText = data.code;
                    document.getElementById('codeBox').style.display = 'block';
                }
            } catch (err) { alert('Imefeli!'); }
            document.getElementById('submitBtn').innerText = 'Request Code';
        }
    </script>
</body>
</html>
